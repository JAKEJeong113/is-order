<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>도매처 설정</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f8faf9;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --mint: #14b8a6;
      --mint-soft: #ccfbf1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "Pretendard", "Malgun Gothic", sans-serif;
      padding: 24px 16px 80px;
    }
    h1 { font-size: 20px; margin: 0 0 16px; }
    .vendor-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .vendor-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .vendor-name { font-weight: 700; font-size: 16px; }
    .vendor-url { font-size: 12px; color: var(--muted); margin-left: 6px; }
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background-color: #d1d5db; border-radius: 24px; transition: .2s;
    }
    .slider:before {
      position: absolute; content: ""; height: 18px; width: 18px;
      left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: .2s;
    }
    input:checked + .slider { background-color: var(--mint); }
    input:checked + .slider:before { transform: translateX(20px); }
    .cred-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .cred-row input[type="text"], .cred-row input[type="password"] {
      flex: 1; min-width: 140px; padding: 8px 10px;
      border: 1px solid var(--line); border-radius: 8px; font-size: 14px;
    }
    .save-btn {
      padding: 8px 14px; border: none; border-radius: 8px;
      background: var(--mint); color: white; font-weight: 600; cursor: pointer;
    }
    .save-btn:disabled { background: #a7f3d0; cursor: default; }
    .status-text { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .badge {
      font-size: 11px; padding: 2px 8px; border-radius: 999px;
      background: var(--mint-soft); color: #0f766e; margin-left: 8px;
    }
    .refresh-bar {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--card); border: 1px solid var(--line); border-radius: 12px;
      padding: 14px 16px; margin-bottom: 16px;
    }
    .refresh-btn {
      padding: 8px 16px; border: none; border-radius: 8px;
      background: var(--mint); color: white; font-weight: 700; cursor: pointer;
    }
    .refresh-btn:disabled { background: #a7f3d0; cursor: default; }
  </style>
</head>
<body>
  <h1>도매처 설정</h1>

  <div class="refresh-bar">
    <div>
      <div style="font-weight:700;">상품 카탈로그</div>
      <div id="catalog-status" class="status-text">불러오는 중...</div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshCatalog()">지금 새로고침</button>
  </div>

  <div id="vendor-list"></div>

  <script>
    const vendorNameMap = {};

    async function loadVendors() {
      const res = await fetch("/api/vendors");
      const data = await res.json();
      const list = document.getElementById("vendor-list");
      list.innerHTML = "";

      data.vendors.forEach((v) => { vendorNameMap[v.vendor_id] = v.name; });

      data.vendors.forEach((v) => {
        const card = document.createElement("div");
        card.className = "vendor-card";

        const threshold = v.free_shipping_threshold
          ? `무료배송 ${v.free_shipping_threshold.toLocaleString()}원 이상`
          : "무료배송 기준 미입력";

        card.innerHTML = `
          <div class="vendor-head">
            <div>
              <span class="vendor-name">${v.name}</span>
              <span class="vendor-url">${v.base_url}</span>
              ${v.has_credentials ? '<span class="badge">저장됨</span>' : ""}
            </div>
            <label class="switch">
              <input type="checkbox" class="enabled-toggle" data-vendor="${v.vendor_id}" ${v.enabled ? "checked" : ""}>
              <span class="slider"></span>
            </label>
          </div>
          <div class="status-text">${threshold}</div>
          <div class="cred-row" style="margin-top:10px;">
            <input type="text" placeholder="아이디" class="login-id" data-vendor="${v.vendor_id}">
            <input type="password" placeholder="비밀번호 (저장 시에만 입력)" class="login-pwd" data-vendor="${v.vendor_id}">
            <button class="save-btn" data-vendor="${v.vendor_id}">저장</button>
          </div>
          <div class="status-text save-status" data-vendor="${v.vendor_id}"></div>
        `;
        list.appendChild(card);
      });

      document.querySelectorAll(".enabled-toggle").forEach((el) => {
        el.addEventListener("change", async (e) => {
          const vendorId = e.target.dataset.vendor;
          await fetch(`/api/vendors/${vendorId}/toggle`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ enabled: e.target.checked }),
          });
        });
      });

      document.querySelectorAll(".save-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const vendorId = btn.dataset.vendor;
          const idInput = document.querySelector(`.login-id[data-vendor="${vendorId}"]`);
          const pwInput = document.querySelector(`.login-pwd[data-vendor="${vendorId}"]`);
          const statusEl = document.querySelector(`.save-status[data-vendor="${vendorId}"]`);

          if (!idInput.value || !pwInput.value) {
            statusEl.textContent = "아이디와 비밀번호를 모두 입력해주세요.";
            return;
          }

          btn.disabled = true;
          statusEl.textContent = "저장 중...";

          const res = await fetch(`/api/vendors/${vendorId}/credentials`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ login_id: idInput.value, login_pwd: pwInput.value }),
          });
          const data = await res.json();

          btn.disabled = false;
          statusEl.textContent = data.ok ? "저장 완료" : `저장 실패: ${data.message || ""}`;

          if (data.ok) {
            pwInput.value = "";
            loadVendors();
          }
        });
      });
    }

    function formatRelativeTime(isoString) {
      if (!isoString) return "아직 없음";
      const diffMs = Date.now() - new Date(isoString).getTime();
      const mins = Math.floor(diffMs / 60000);
      if (mins < 1) return "방금 전";
      if (mins < 60) return `${mins}분 전`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}시간 전`;
      return `${Math.floor(hours / 24)}일 전`;
    }

    async function loadCatalogStatus() {
      const res = await fetch("/api/catalog/status");
      const data = await res.json();
      const el = document.getElementById("catalog-status");

      if (!data.status || data.status.length === 0) {
        el.textContent = "아직 크롤링한 적 없음 - 새로고침을 눌러주세요.";
        return;
      }

      el.innerHTML = data.status.map((s) => {
        const name = vendorNameMap[s.vendor_id] || s.vendor_id;
        if (!s.ok) {
          return `${name}: 실패 (${s.error || "알수없음"})`;
        }
        return `${name}: 상품 ${s.product_count}개 · ${formatRelativeTime(s.refreshed_at)}`;
      }).join(" · ");
    }

    async function refreshCatalog() {
      const btn = document.getElementById("refreshBtn");
      btn.disabled = true;
      btn.textContent = "크롤링 중...";

      await fetch("/api/catalog/refresh", { method: "POST" });

      const poll = setInterval(async () => {
        await loadCatalogStatus();
      }, 5000);

      setTimeout(() => {
        clearInterval(poll);
        btn.disabled = false;
        btn.textContent = "지금 새로고침";
        loadCatalogStatus();
      }, 5 * 60 * 1000);
    }

    loadVendors().then(loadCatalogStatus);
  </script>
</body>
</html>
