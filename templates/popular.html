<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>인기상품 TOP30</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f8faf9; --card: #ffffff; --text: #111827; --muted: #6b7280;
      --line: #e5e7eb; --mint: #14b8a6; --mint-soft: #ccfbf1; --mint-text: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, "Pretendard", "Malgun Gothic", sans-serif;
      padding: 24px 16px 80px;
    }
    h1 { font-size: 20px; margin: 0 0 16px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab {
      flex: 1; padding: 10px; text-align: center; border-radius: 10px;
      border: 1px solid var(--line); background: var(--card); cursor: pointer;
      font-weight: 700; font-size: 14px; color: var(--muted);
    }
    .tab.active { background: var(--mint); color: white; border-color: var(--mint); }
    .item-row {
      display: flex; align-items: center; gap: 12px;
      background: var(--card); border: 1px solid var(--line); border-radius: 10px;
      padding: 12px 14px; margin-bottom: 8px;
    }
    .rank {
      width: 28px; height: 28px; border-radius: 50%; background: var(--mint-soft);
      color: var(--mint-text); font-weight: 800; font-size: 13px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .rank.top3 { background: var(--mint); color: white; }
    .item-name { font-weight: 600; font-size: 14px; flex: 1; }
    .item-sub { font-size: 12px; color: var(--muted); text-align: right; }
    .empty-text { color: var(--muted); font-size: 14px; padding: 20px 4px; }
  </style>
</head>
<body>
  <h1>인기상품 TOP30 (전 가맹점 합산)</h1>
  <div class="tabs">
    <div class="tab active" data-category="icecream" onclick="selectTab('icecream')">아이스크림</div>
    <div class="tab" data-category="coupang" onclick="selectTab('coupang')">쿠팡</div>
    <div class="tab" data-category="wholesale" onclick="selectTab('wholesale')">도매처</div>
  </div>
  <div id="list"></div>

  <script>
    async function selectTab(category) {
      document.querySelectorAll(".tab").forEach((t) => {
        t.classList.toggle("active", t.dataset.category === category);
      });

      const listEl = document.getElementById("list");
      listEl.innerHTML = '<div class="empty-text">불러오는 중...</div>';

      const res = await fetch(`/api/popular?category=${category}`);
      const data = await res.json();

      if (!data.items || data.items.length === 0) {
        listEl.innerHTML = '<div class="empty-text">아직 집계된 데이터가 없습니다.</div>';
        return;
      }

      listEl.innerHTML = data.items.map((item, i) => `
        <div class="item-row">
          <div class="rank ${i < 3 ? "top3" : ""}">${i + 1}</div>
          <div class="item-name">${item.item_name || item.item_key}</div>
          <div class="item-sub">누적 ${item.total_qty.toLocaleString()}개<br>${item.store_count}개 지점</div>
        </div>
      `).join("");
    }

    selectTab("icecream");
  </script>
</body>
</html>
