<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>도매처 가격비교</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f8faf9;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --mint: #14b8a6;
      --mint-soft: #ccfbf1;
      --mint-text: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "Pretendard", "Malgun Gothic", sans-serif;
    }
    .app-main { padding-bottom: 80px; }
    h1 { font-size: 20px; margin: 0 0 16px; }
    .search-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .search-row input {
      flex: 1; padding: 12px 14px; border: 1px solid var(--line);
      border-radius: 10px; font-size: 15px;
    }
    .search-row button {
      padding: 12px 20px; border: none; border-radius: 10px;
      background: var(--mint); color: white; font-weight: 700; font-size: 15px; cursor: pointer;
    }
    .search-row button:disabled { background: #a7f3d0; }
    .result-card {
      background: var(--card); border: 1px solid var(--line); border-radius: 12px;
      padding: 16px; margin-bottom: 10px; display: flex; justify-content: space-between;
      align-items: center; gap: 12px;
    }
    .result-card.cheapest { border-color: var(--mint); background: var(--mint-soft); }
    .vendor-name { font-weight: 700; font-size: 15px; }
    .product-name { font-size: 13px; color: var(--muted); margin-top: 2px; white-space: pre-line; }
    .price { font-size: 20px; font-weight: 800; text-align: right; }
    .price-sub { font-size: 12px; color: var(--muted); text-align: right; margin-top: 2px; }
    .badge {
      font-size: 11px; padding: 2px 8px; border-radius: 999px;
      background: var(--mint); color: white; margin-left: 8px;
    }
    .error-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 999px;
      background: #fee2e2; color: #b91c1c; margin-left: 8px;
    }
    .empty-text, .loading-text { color: var(--muted); font-size: 14px; padding: 20px 4px; }
    a.product-link { color: inherit; text-decoration: none; }
    .alt-list { margin-top: 8px; border-top: 1px dashed var(--line); padding-top: 8px; }
    .alt-item {
      display: flex; justify-content: space-between; font-size: 12px;
      color: var(--muted); padding: 2px 0;
    }
    .alt-item .alt-price { font-weight: 600; color: var(--text); }
    .hint-text { font-size: 12px; color: var(--muted); margin: -4px 0 14px; }

    .group-card {
      background: var(--card); border: 1px solid var(--line); border-radius: 12px;
      margin-bottom: 12px; overflow: hidden; cursor: pointer;
    }
    .group-head {
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px; padding: 18px 20px; border-left: 3px solid var(--mint);
    }
    .group-title { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.35; }
    .group-count { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .group-head .price { color: var(--text); font-size: 19px; font-weight: 800; text-align: right; }
    .chevron { color: #9ca3af; font-size: 12px; transition: transform .15s; }
    .group-card.open .chevron { transform: rotate(180deg); }
    .group-detail {
      display: none; padding: 14px 16px; background: var(--bg); border-top: 1px solid var(--line);
    }
    .group-card.open .group-detail { display: block; }
    .offer-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 12px; margin-bottom: 6px; border-radius: 8px;
      background: var(--card); border: 1px solid var(--line);
    }
    .offer-row:last-child { margin-bottom: 0; }
    .offer-row.cheapest { background: var(--mint); border-color: var(--mint-text); }
    .offer-row.cheapest .offer-vendor,
    .offer-row.cheapest .offer-price { color: white; }
    .offer-row.cheapest .offer-name { color: #e6fffa; }
    .offer-row.cheapest .price-sub { color: #e6fffa; }
    .offer-row.cheapest .badge { background: white; color: var(--mint-text); }
    .vendor-tag {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      margin-right: 6px;
    }
    .offer-vendor { font-weight: 700; font-size: 13px; }
    .offer-name { font-size: 11px; color: var(--muted); white-space: pre-line; margin-top: 2px; }
    .offer-row.cheapest .offer-name { }
    .offer-price { font-weight: 800; font-size: 15px; text-align: right; }
    section-title { display: block; font-size: 15px; margin: 20px 0 10px; font-weight: 700; }

    .user-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px; font-size: 12px; color: var(--muted);
    }
    .user-bar a { color: var(--mint-text); text-decoration: none; font-weight: 600; }
    .store-tag {
      font-size: 11px; padding: 2px 8px; border-radius: 999px;
      background: var(--mint-soft); color: #0f766e; margin-left: 6px;
    }
    .offer-actions { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .qty-input {
      width: 48px; padding: 6px; border: 1px solid var(--line);
      border-radius: 6px; text-align: center; font-size: 13px;
    }
    .cart-btn {
      padding: 6px 12px; border: none; border-radius: 6px; font-size: 12px;
      font-weight: 700; cursor: pointer; background: var(--text); color: white;
    }
    .offer-row.cheapest .cart-btn { background: white; color: var(--mint-text); }
    .cart-btn:disabled { opacity: 0.6; cursor: default; }
    .cart-status { font-size: 11px; margin-top: 4px; }
  </style>
</head>
<body>
  {% include "_sidebar.html" %}
  <h1>도매처 가격비교</h1>
  <div class="user-bar" id="userBar"></div>
  <div class="search-row">
    <input id="keyword" type="text" placeholder="상품명을 검색하세요 (예: 젤리)" />
    <button id="searchBtn">비교</button>
  </div>
  <div id="results"></div>

      </div>
    </div>

  <script>
    const input = document.getElementById("keyword");
    const btn = document.getElementById("searchBtn");
    const resultsEl = document.getElementById("results");
    const userBar = document.getElementById("userBar");

    let currentUser = null;

    async function loadCurrentUser() {
      const res = await fetch("/api/auth/me");
      const data = await res.json();

      if (!data.logged_in) {
        window.location.href = "/login";
        return;
      }

      currentUser = data;
      userBar.innerHTML = `
        <span>${data.display_name} (${data.email})</span>
        <span><a href="/my-vendors">내 도매처 계정</a> · <a href="#" onclick="logout(); return false;">로그아웃</a></span>
      `;
    }

    async function logout() {
      await fetch("/api/auth/logout", { method: "POST" });
      window.location.href = "/login";
    }

    loadCurrentUser();

    const VENDOR_COLORS = {
      yamimall: "#f97316",
      ccdome: "#3b82f6",
      "3bong": "#8b5cf6",
      samwon: "#ec4899",
      hdinter: "#14b8a6",
      moomarket: "#eab308",
      douyou: "#ef4444",
    };

    const CART_SUPPORTED_VENDORS = ["yamimall", "ccdome", "3bong", "hdinter", "moomarket", "douyou"];

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // 상품명에 줄바꿈 등이 섞여 있으면 onclick="addToCart('...')" 형태의 인라인 문자열이
    // 깨져서 버튼이 아예 반응하지 않는 문제가 있었다. data-* 속성 + 이벤트 위임으로 바꿔
    // 값이 항상 안전하게 전달되도록 한다.
    // .offer-row/.offer-actions가 그룹 카드 토글을 막으려고 stopPropagation을 호출하므로,
    // bubble 단계에서 위임하면 여기까지 이벤트가 올라오지 못한다. capture 단계에서 먼저
    // 잡아서 stopPropagation의 영향을 받지 않게 한다.
    resultsEl.addEventListener("click", (e) => {
      const btnEl = e.target.closest(".cart-btn");
      if (!btnEl) return;
      addToIsorderCart(btnEl);
    }, true);

    // compare 페이지의 "담기"는 실제 도매몰에 바로 담지 않고 isorder 자체
    // 장바구니에만 빠르게 저장한다(DB insert만 하므로 즉시 끝남) - 상품마다
    // Playwright 자동화를 기다려야 하면 여러 개를 빠르게 못 담아서, 실제
    // 도매몰 담기는 /cart 페이지에서 한 번에 처리하도록 분리했다.
    async function addToIsorderCart(btnEl) {
      const row = btnEl.closest(".offer-row");
      const qty = parseInt(row.querySelector(".qty-input").value, 10) || 1;
      const statusEl = row.querySelector(".cart-status");
      const { vendorId, vendorName, productUrl, itemName, itemKey, price, allOffers } = btnEl.dataset;

      btnEl.disabled = true;
      statusEl.textContent = "담는 중...";

      try {
        const res = await fetch("/api/isorder-cart/add", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            vendor_id: vendorId, vendor_name: vendorName, product_url: productUrl,
            item_key: itemKey, item_name: itemName,
            price: price ? parseInt(price, 10) : null, qty,
            all_offers: allOffers ? JSON.parse(allOffers) : [],
          }),
        });
        const data = await res.json();
        statusEl.textContent = data.ok ? "장바구니에 담음 (/cart에서 확인)" : `실패: ${data.reason || data.error || ""}`;
      } catch (e) {
        statusEl.textContent = "담기 중 오류 발생";
      } finally {
        btnEl.disabled = false;
      }
    }

    async function runCompare() {
      const keyword = input.value.trim();
      if (!keyword) return;

      btn.disabled = true;
      resultsEl.innerHTML = '<div class="loading-text">가격 조회 중입니다 (도매처별로 실제 로그인해서 확인하는 중이라 최대 1~2분 걸릴 수 있어요)...</div>';

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 120000);

      try {
        const res = await fetch("/api/price-compare", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ keyword }),
          signal: controller.signal,
        });
        if (res.status === 401) {
          window.location.href = "/login";
          return;
        }
        const data = await res.json();
        renderResults(data.groups || [], data.vendors || []);
      } catch (e) {
        const msg = e.name === "AbortError"
          ? "2분 넘게 응답이 없어 중단했습니다. 도매처 로그인 상태를 확인해주세요."
          : "조회 중 오류가 발생했습니다.";
        resultsEl.innerHTML = `<div class="empty-text">${msg}</div>`;
      } finally {
        clearTimeout(timeoutId);
        btn.disabled = false;
      }
    }

    // 상품명에 포장단위가 "(1묶음 10개입)"처럼 붙어있는 경우가 많아, 개당가/전체가를
    // 같이 보여주려고 이름 텍스트에서 개수만 뽑아본다(텔레그램 쪽 표시 개선과 동일한
    // 접근 - 장바구니 담기 수량 계산 로직과는 무관한 표시 전용).
    const DISPLAY_PACK_QTY_PATTERNS = [/[xX×]\s*(\d+)\s*개/, /(\d+)\s*개입/];

    function extractDisplayPackQty(text) {
      for (const pattern of DISPLAY_PACK_QTY_PATTERNS) {
        const m = (text || "").match(pattern);
        if (m) return parseInt(m[1], 10);
      }
      return null;
    }

    function formatPricePair(price, name) {
      if (!price) return { main: "가격 확인 필요", sub: "" };
      const packQty = extractDisplayPackQty(name);
      if (packQty && packQty > 1) {
        return {
          main: `${price.toLocaleString()}원`,
          sub: `개당 ${Math.floor(price / packQty).toLocaleString()}원`,
        };
      }
      return { main: `${price.toLocaleString()}원`, sub: "" };
    }

    function renderOfferRow(o, allOffers) {
      const nameText = (o.name || "").trim();
      const { main: priceMain, sub: priceSub } = formatPricePair(o.price, nameText);
      const shipText = o.free_shipping_threshold
        ? `무료배송 ${o.free_shipping_threshold.toLocaleString()}원 이상`
        : "무료배송 기준 미입력";
      const confidencePct = Math.round((o.match_score ?? 0) * 100);
      const rowClass = o.is_cheapest ? "offer-row cheapest" : "offer-row";
      const dotColor = VENDOR_COLORS[o.vendor_id] || "#94a3b8";

      const nameHtml = o.product_url
        ? `<a class="product-link" href="${o.product_url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${nameText}</a>`
        : nameText;

      // 품절 시 자동으로 시도해볼 다른 도매처 후보(alt_offers)를 계산할 수 있게,
      // 같은 그룹의 다른 offer들을 통째로 같이 담아둔다(텔레그램 봇과 동일한
      // 자동 전환 로직을 서버에서 쓸 수 있게).
      const cartHtml = CART_SUPPORTED_VENDORS.includes(o.vendor_id) && o.product_url ? `
        <div class="offer-actions" onclick="event.stopPropagation()">
          <input type="number" class="qty-input" value="1" min="1" max="99">
          <button class="cart-btn"
            data-vendor-id="${escapeHtml(o.vendor_id)}"
            data-vendor-name="${escapeHtml(o.vendor_name)}"
            data-product-url="${escapeHtml(o.product_url)}"
            data-item-name="${escapeHtml(nameText)}"
            data-item-key="${escapeHtml(o.goods_no || o.product_url)}"
            data-price="${o.price || ""}"
            data-all-offers="${escapeHtml(JSON.stringify(allOffers || []))}"
          >담기</button>
          <span class="cart-status"></span>
        </div>
      ` : "";

      const inner = `
        <div style="flex:1;">
          <span class="vendor-tag" style="background:${dotColor};"></span>
          <span class="offer-vendor">${o.vendor_name}</span>
          ${o.is_cheapest ? '<span class="badge">최저가</span>' : ""}
          <div class="offer-name">${nameHtml}</div>
          <div class="offer-name">${shipText} · 일치도 ${confidencePct}%</div>
          ${cartHtml}
        </div>
        <div>
          <div class="offer-price">${priceMain}</div>
          ${priceSub ? `<div class="price-sub">${priceSub}</div>` : ""}
        </div>
      `;

      return `<div class="${rowClass}" onclick="event.stopPropagation()">${inner}</div>`;
    }

    function renderGroupCard(g, idx) {
      const name = (g.representative_name || "").trim();
      const { main: priceMain, sub: priceSub } = formatPricePair(g.best_price, name);
      const compareText = g.vendor_count > 1
        ? `${g.vendor_count}개 도매처 비교 · ${g.best_vendor_name} 최저가`
        : `${g.best_vendor_name}에서만 발견`;

      const offersHtml = g.offers.map((o) => renderOfferRow(o, g.offers)).join("");

      return `
        <div class="group-card" id="group-${idx}" onclick="toggleGroup(${idx})">
          <div class="group-head">
            <div>
              <div class="group-title">${name}</div>
              <div class="group-count">${compareText}</div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <div>
                <div class="price">${priceMain}</div>
                ${priceSub ? `<div class="price-sub">${priceSub}</div>` : ""}
              </div>
              <span class="chevron">▼</span>
            </div>
          </div>
          <div class="group-detail">${offersHtml}</div>
        </div>
      `;
    }

    function toggleGroup(idx) {
      document.getElementById(`group-${idx}`).classList.toggle("open");
    }

    function renderVendorDetail(r) {
      if (!r.candidates || r.candidates.length === 0) {
        return `
          <div class="result-card">
            <div>
              <span class="vendor-name">${r.vendor_name}</span>
              <span class="error-badge">${r.error || "조회 실패"}</span>
            </div>
          </div>
        `;
      }

      const rows = r.candidates.map((c) => `
        <div class="alt-item">
          <span>${(c.name || "").trim()}</span>
          <span class="alt-price">${c.price ? c.price.toLocaleString() + "원" : "-"}</span>
        </div>
      `).join("");

      return `
        <div class="result-card">
          <div style="flex:1;">
            <span class="vendor-name">${r.vendor_name}</span>
            <div class="alt-list" style="margin-top:6px;">${rows}</div>
          </div>
        </div>
      `;
    }

    function renderResults(groups, vendorResults) {
      if (groups.length === 0 && vendorResults.length === 0) {
        resultsEl.innerHTML = '<div class="empty-text">검색 결과가 없습니다. 켜져 있는 도매처(/vendors)가 있는지 확인해주세요.</div>';
        return;
      }

      let html = `<div class="hint-text">상품을 클릭하면 도매처별 가격을 비교해서 보여줍니다. 같은 이름이어도 실제로는 다른 상품일 수 있으니 상품명을 확인해주세요.</div>`;

      if (groups.length > 0) {
        html += groups.map(renderGroupCard).join("");
      } else {
        html += `<div class="empty-text">검색 결과를 찾지 못했습니다. 아래 도매처별 검색결과를 직접 확인해주세요.</div>`;
      }

      if (vendorResults.length > 0) {
        html += `<h2 style="font-size:15px;margin:20px 0 10px;">도매처별 검색결과 원본</h2>`;
        html += vendorResults.map(renderVendorDetail).join("");
      }

      resultsEl.innerHTML = html;
    }

    btn.addEventListener("click", runCompare);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") runCompare();
    });
  </script>
</body>
</html>
