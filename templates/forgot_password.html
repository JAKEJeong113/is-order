<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>비밀번호 찾기</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { --bg: #f8faf9; --card: #ffffff; --text: #111827; --muted: #6b7280; --line: #e5e7eb; --mint: #14b8a6; }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, "Pretendard", "Malgun Gothic", sans-serif;
      display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px;
    }
    .box { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 28px; width: 100%; max-width: 360px; }
    h1 { font-size: 19px; margin: 0 0 10px; text-align: center; }
    p.desc { font-size: 13px; color: var(--muted); text-align: center; margin: 0 0 20px; }
    input {
      width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 8px;
      font-size: 14px; margin-bottom: 10px;
    }
    button {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      background: var(--mint); color: white; font-weight: 700; font-size: 15px; cursor: pointer;
    }
    .error-text { color: #b91c1c; font-size: 13px; margin-bottom: 10px; min-height: 16px; }
    .success-text { color: #047857; font-size: 13px; margin-bottom: 10px; min-height: 16px; }
    .switch-link { text-align: center; margin-top: 16px; font-size: 13px; color: var(--muted); }
    .switch-link a { color: var(--mint); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="box">
    <h1>비밀번호 찾기</h1>
    <p class="desc">가입하신 이메일로 재설정 링크를 보내드릴게요.</p>
    <div class="error-text" id="error"></div>
    <div class="success-text" id="success"></div>
    <input id="email" type="email" placeholder="이메일" autocomplete="username">
    <button id="sendBtn">재설정 링크 보내기</button>
    <div class="switch-link"><a href="/login">로그인으로 돌아가기</a></div>
  </div>

  <script>
    async function sendResetLink() {
      const email = document.getElementById("email").value.trim();
      const errorEl = document.getElementById("error");
      const successEl = document.getElementById("success");
      errorEl.textContent = "";
      successEl.textContent = "";

      if (!email) {
        errorEl.textContent = "이메일을 입력해주세요.";
        return;
      }

      const btn = document.getElementById("sendBtn");
      btn.disabled = true;
      const res = await fetch("/api/auth/forgot-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email }),
      });
      const data = await res.json();
      btn.disabled = false;

      if (data.ok) {
        successEl.textContent = data.message;
      } else {
        errorEl.textContent = data.message || "요청에 실패했습니다.";
      }
    }

    document.getElementById("sendBtn").addEventListener("click", sendResetLink);
  </script>
</body>
</html>
