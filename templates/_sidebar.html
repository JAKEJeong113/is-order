<style>
  .app-shell { display: flex; min-height: 100vh; align-items: stretch; }
  .app-sidebar {
    width: 190px; flex-shrink: 0; background: var(--card);
    border-right: 1px solid var(--line); padding: 20px 12px;
    display: flex; flex-direction: column; gap: 2px;
    position: sticky; top: 0; align-self: flex-start; height: 100vh;
    transition: width .15s; overflow: hidden;
  }
  .app-sidebar.collapsed { width: 60px; padding: 20px 8px; }
  .app-sidebar .app-brand {
    display: flex; align-items: center; gap: 8px;
    font-size: 15px; font-weight: 700; padding: 0 10px 20px;
  }
  .app-sidebar.collapsed .app-brand { padding: 0 0 20px 2px; }
  .app-sidebar .app-brand .app-brand-badge {
    width: 26px; height: 26px; border-radius: 8px; background: var(--mint);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .app-nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px;
    text-decoration: none; color: #374151; font-size: 13px; font-weight: 600;
    white-space: nowrap;
  }
  .app-sidebar.collapsed .app-nav-item { padding: 9px; justify-content: center; }
  .app-nav-item svg { flex-shrink: 0; color: #9ca3af; }
  .app-nav-item:hover { background: var(--bg); }
  .app-nav-item.active { background: var(--mint-soft); color: var(--mint-text); }
  .app-nav-item.active svg { color: var(--mint-text); }
  .app-sidebar.collapsed .nav-label,
  .app-sidebar.collapsed .app-brand-text,
  .app-sidebar.collapsed .footer-label { display: none; }
  .app-sidebar .app-spacer { flex: 1; }
  .app-toggle-row { display: flex; justify-content: flex-end; padding: 0 2px 6px; }
  .app-sidebar.collapsed .app-toggle-row { justify-content: center; }
  .app-toggle-btn {
    width: 24px; height: 24px; border-radius: 6px; border: 1px solid var(--line);
    background: var(--card); color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .app-toggle-btn:hover { background: var(--bg); }
  .app-toggle-btn svg { transition: transform .15s; }
  .app-sidebar.collapsed .app-toggle-btn svg { transform: rotate(180deg); }
  .app-sidebar .app-footer {
    font-size: 11px; color: var(--muted); padding: 10px 10px 0;
    border-top: 1px solid var(--line);
    display: flex; align-items: center; gap: 6px;
  }
  .app-sidebar.collapsed .app-footer { padding: 10px 0 0; justify-content: center; }
  .app-sidebar .app-footer a { color: inherit; text-decoration: none; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .app-main { flex: 1; padding: 24px; min-width: 0; }
  @media (max-width: 640px) {
    .app-main { padding: 14px; }
  }
</style>
<div class="app-shell">

    <div class="app-toggle-row">

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>

    </div>

      <span class="nav-label">가격비교</span>
    </a>
    <a class="app-nav-item {{ 'active' if active_page == 'barcode_search' else '' }}" href="/barcode-search" title="바코드 검색">

      <span class="nav-label">인기상품</span>

    <a class="app-nav-item {{ 'active' if active_page == 'cart' else '' }}" href="/cart" title="장바구니">

      <span class="nav-label">음료 추천</span>

    <a class="app-nav-item {{ 'active' if active_page == 'vendors' else '' }}" href="/my-vendors" title="내 도매처 계정">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>

    <div class="app-spacer"></div>
    <div class="app-footer" id="appShellUserInfo">
      <a href="#" title="로그아웃" onclick="fetch('/api/auth/logout',{method:'POST'}).then(()=>window.location.href='/login');return false;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span class="footer-label">로그아웃</span>
      </a>
    </div>
  </div>
  <script>
    (function () {
      const sidebar = document.getElementById("appSidebar");
      const toggleBtn = document.getElementById("sidebarToggleBtn");
      const stored = localStorage.getItem("appSidebarCollapsed");
      // 사용자가 명시적으로 편 적이 없으면(저장된 값이 아예 없으면) 모바일
      // 화면 폭에서는 기본으로 접어서 시작한다 - 화면이 좁을수록 아이콘만
      // 보이는 게 콘텐츠 공간 확보에 유리하기 때문. 한 번이라도 직접
      // 펴거나 접은 적이 있으면 그 선택을 그대로 존중한다.
      const shouldCollapse = stored === "1" || (stored === null && window.innerWidth <= 640);
      if (shouldCollapse) {
        sidebar.classList.add("collapsed");
      }
      toggleBtn.addEventListener("click", () => {
        sidebar.classList.toggle("collapsed");
        localStorage.setItem("appSidebarCollapsed", sidebar.classList.contains("collapsed") ? "1" : "0");
      });
    })();
  </script>
  <div class="app-main">
