<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>과자 추천</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f8faf9; --card: #ffffff; --text: #111827; --muted: #6b7280;
      --line: #e5e7eb; --mint: #14b8a6; --mint-soft: #ccfbf1; --mint-text: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, "Pretendard", "Malgun Gothic", sans-serif;
    }
    .app-main { padding-bottom: 80px; }
    h1 { font-size: 20px; margin: 0 0 6px; }
    .sub-note { font-size: 12px; color: var(--muted); margin: 0 0 16px; }
    .bev-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
    }
    @media (max-width: 640px) {
      .bev-grid { grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 8px; }
      .bev-body { padding: 8px 8px 10px; }
      .bev-name { font-size: 12px; min-height: 2.5em; }
      .bev-price { font-size: 12px; }
      .buy-badge { font-size: 10px; padding: 3px 7px; }
    }
    .bev-card {
      display: block; background: var(--card); border: 1px solid var(--line);
      border-radius: 12px; overflow: hidden; text-decoration: none; color: inherit;
      position: relative; transition: border-color .15s, transform .15s;
    }
    .bev-card:hover { border-color: var(--mint); transform: translateY(-2px); }
    .bev-rank {
      position: absolute; top: 8px; left: 8px; z-index: 1;
      width: 24px; height: 24px; border-radius: 50%; background: rgba(17,24,39,.55);
      color: #fff; font-weight: 800; font-size: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .bev-rank.top3 { background: var(--mint); }
    .bev-img-wrap {
      width: 100%; aspect-ratio: 1 / 1; background: #f3f4f6;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .bev-img-wrap img { width: 100%; height: 100%; object-fit: contain; }
    .bev-body { padding: 10px 12px 12px; }
    .bev-name {
      font-weight: 600; font-size: 13px; line-height: 1.35;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      min-height: 2.7em;
    }
    .bev-meta {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 6px;
    }
    .bev-price { font-weight: 700; font-size: 13px; }
    .buy-badge {
      font-size: 11px; padding: 3px 9px; border-radius: 999px;
      background: var(--mint); color: white; font-weight: 700; flex-shrink: 0;
    }
    .empty-text { color: var(--muted); font-size: 14px; padding: 20px 4px; }
    .search-row { margin-bottom: 12px; }
    .search-row input {
      width: 100%; max-width: 320px; padding: 9px 12px; border: 1px solid var(--line);
      border-radius: 8px; font-size: 13px; background: var(--card); color: var(--text);
    }
    .search-row input:focus { outline: none; border-color: var(--mint); }
    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .filter-btn {
      padding: 7px 14px; border: 1px solid var(--line); border-radius: 999px;
      font-size: 12px; font-weight: 700; cursor: pointer; background: var(--card); color: var(--muted);
    }
    .filter-btn.active { background: var(--mint); border-color: var(--mint); color: white; }
    .bev-card-link { display: block; text-decoration: none; color: inherit; }
    .chart-toggle {
      display: block; width: 100%; text-align: center; padding: 5px 0;
      border: none; border-top: 1px solid var(--line); background: transparent;
      color: var(--mint-text); font-size: 11px; font-weight: 700; cursor: pointer;
    }
    .chart-toggle:hover { background: var(--mint-soft); }
    .chart-area { display: none; padding: 6px 10px 10px; border-top: 1px solid var(--line); }
    .chart-area.open { display: block; }
    .chart-area canvas { width: 100%; height: 70px; display: block; }
    .chart-empty { font-size: 11px; color: var(--muted); text-align: center; padding: 8px 0; }
  </style>
</head>
<body>
  {% include "_sidebar.html" %}
  <h1>과자 추천</h1>
  <div class="sub-note" id="refreshedNote">선택 많이 받은 순 · 매일 자동 갱신</div>
  <div class="search-row"><input type="text" id="searchInput" placeholder="과자 이름으로 검색..." /></div>
  <div class="filter-row" id="filterRow"></div>
  <div id="grid" class="bev-grid"></div>

      </div>
    </div>

  <script>
    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    const PACKAGE_TYPES = ["봉지", "박스", "낱개", "초콜릿", "젤리", "사탕", "미분류"];
    let allItems = [];
    let activeFilter = "전체보기";
    let searchQuery = "";

    function renderFilterRow() {
      const filterEl = document.getElementById("filterRow");
      const options = ["전체보기", ...PACKAGE_TYPES];
      filterEl.innerHTML = options.map((opt) =>
        `<button class="filter-btn ${opt === activeFilter ? "active" : ""}" data-filter="${escapeHtml(opt)}">${escapeHtml(opt)}</button>`
      ).join("");
      filterEl.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          activeFilter = btn.dataset.filter;
          renderFilterRow();
          renderGrid();
        });
      });
    }

    async function load() {
      const gridEl = document.getElementById("grid");
      gridEl.innerHTML = '<div class="empty-text">불러오는 중...</div>';

      const res = await fetch("/api/snack-ranking");
      const data = await res.json();
      allItems = data.items || [];

      if (allItems.length === 0) {
        gridEl.innerHTML = '<div class="empty-text">아직 준비된 과자 카드가 없습니다.</div>';
        return;
      }

      if (allItems[0].refreshed_at) {
        document.getElementById("refreshedNote").textContent =
          `선택 많이 받은 순 · 최근 갱신 ${allItems[0].refreshed_at} (매일 자동 갱신됩니다)`;
      }

      renderFilterRow();
      renderGrid();
    }

    document.getElementById("searchInput").addEventListener("input", (e) => {
      searchQuery = e.target.value.trim().toLowerCase();
      renderGrid();
    });

    function renderGrid() {
      const gridEl = document.getElementById("grid");
      let items = activeFilter === "전체보기"
        ? allItems
        : allItems.filter((it) => (it.category || "미분류") === activeFilter);
      if (searchQuery) {
        items = items.filter((it) => (it.item_name || "").toLowerCase().includes(searchQuery));
      }

      if (items.length === 0) {
        gridEl.innerHTML = searchQuery
          ? '<div class="empty-text">검색 결과가 없습니다.</div>'
          : '<div class="empty-text">해당 분류의 과자가 없습니다.</div>';
        return;
      }

      gridEl.innerHTML = items.map((item, i) => {
        const name = item.item_name || "(이름 없음)";
        const priceText = item.price ? `${item.price.toLocaleString()}원` : "";
        const imgTag = item.image_url
          ? `<img src="${escapeHtml(item.image_url)}" alt="${escapeHtml(name)}" loading="lazy">`
          : "";
        return `
          <div class="bev-card" data-item-key="${escapeHtml(item.item_key)}">
            <a class="bev-card-link" href="${escapeHtml(item.partners_link)}" target="_blank" rel="noopener">
              <div class="bev-rank ${i < 3 ? "top3" : ""}">${i + 1}</div>
              <div class="bev-img-wrap">${imgTag}</div>
              <div class="bev-body">
                <div class="bev-name">${escapeHtml(name)}</div>
                <div class="bev-meta">
                  <span class="bev-price">${priceText}</span>
                  <span class="buy-badge">구매하기</span>
                </div>
              </div>
            </a>
            <button class="chart-toggle" type="button">📈 가격추이</button>
            <div class="chart-area"></div>
          </div>
        `;
      }).join("");

      gridEl.querySelectorAll(".bev-card-link").forEach((link) => {
        link.addEventListener("click", () => {
          const itemKey = link.closest(".bev-card").getAttribute("data-item-key");
          try {
            fetch(`/api/snack-click/${encodeURIComponent(itemKey)}`, { method: "POST", keepalive: true });
          } catch (e) {}
        });
      });

      gridEl.querySelectorAll(".chart-toggle").forEach((btn) => {
        btn.addEventListener("click", () => togglePriceChart(btn, "snack"));
      });
    }

    async function togglePriceChart(btn, slug) {
      const card = btn.closest(".bev-card");
      const itemKey = card.getAttribute("data-item-key");
      const areaEl = card.querySelector(".chart-area");

      if (areaEl.classList.contains("open")) {
        areaEl.classList.remove("open");
        return;
      }
      areaEl.classList.add("open");
      if (areaEl.dataset.loaded) return;

      areaEl.innerHTML = '<div class="chart-empty">불러오는 중...</div>';
      try {
        const res = await fetch(`/api/${slug}-price-history/${encodeURIComponent(itemKey)}`);
        const data = await res.json();
        const points = data.points || [];
        if (points.length < 2) {
          areaEl.innerHTML = '<div class="chart-empty">아직 가격 추이 데이터가 부족합니다.</div>';
        } else {
          areaEl.innerHTML = "<canvas></canvas>";
          drawPriceChart(areaEl.querySelector("canvas"), points);
        }
        areaEl.dataset.loaded = "1";
      } catch (e) {
        areaEl.innerHTML = '<div class="chart-empty">불러오지 못했습니다.</div>';
      }
    }

    function drawPriceChart(canvas, points) {
      const dpr = window.devicePixelRatio || 1;
      const cssWidth = canvas.parentElement.clientWidth || 220;
      const cssHeight = 70;
      canvas.width = cssWidth * dpr;
      canvas.height = cssHeight * dpr;
      canvas.style.width = cssWidth + "px";
      canvas.style.height = cssHeight + "px";
      const ctx = canvas.getContext("2d");
      ctx.scale(dpr, dpr);

      const prices = points.map((p) => p.price);
      const min = Math.min(...prices);
      const max = Math.max(...prices);
      const padX = 4;
      const topPad = 12;
      const w = cssWidth - padX * 2;
      const h = cssHeight - topPad - 6;
      const range = max - min || 1;

      const xAt = (i) => padX + (i / (points.length - 1)) * w;
      const yAt = (v) => topPad + h - ((v - min) / range) * h;

      ctx.strokeStyle = "#14b8a6";
      ctx.lineWidth = 2;
      ctx.beginPath();
      points.forEach((p, i) => {
        const x = xAt(i), y = yAt(p.price);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.stroke();

      const lastX = xAt(points.length - 1), lastY = yAt(points[points.length - 1].price);
      ctx.fillStyle = "#14b8a6";
      ctx.beginPath();
      ctx.arc(lastX, lastY, 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#6b7280";
      ctx.font = "10px sans-serif";
      ctx.textAlign = "left";
      ctx.fillText(`최저 ${min.toLocaleString()}원`, padX, 9);
      ctx.textAlign = "right";
      ctx.fillText(`최고 ${max.toLocaleString()}원`, padX + w, 9);
    }

    load();
  </script>
</body>
</html>
