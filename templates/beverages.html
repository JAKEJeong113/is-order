<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>음료 인기순위</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f8faf9; --card: #ffffff; --text: #111827; --muted: #6b7280;
      --line: #e5e7eb; --mint: #14b8a6; --mint-soft: #ccfbf1; --mint-text: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, "Pretendard", "Malgun Gothic", sans-serif;
    }
    .app-main { padding-bottom: 80px; }
    h1 { font-size: 20px; margin: 0 0 6px; }
    .sub-note { font-size: 12px; color: var(--muted); margin: 0 0 16px; }
    .item-row {
      display: flex; align-items: center; gap: 12px;
      background: var(--card); border: 1px solid var(--line); border-radius: 10px;
      padding: 12px 14px; margin-bottom: 8px;
      text-decoration: none; color: inherit;
    }
    a.item-row:hover { border-color: var(--mint); }
    .rank {
      width: 28px; height: 28px; border-radius: 50%; background: var(--mint-soft);
      color: var(--mint-text); font-weight: 800; font-size: 13px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .rank.top3 { background: var(--mint); color: white; }
    .item-name { font-weight: 600; font-size: 14px; flex: 1; }
    .item-sub { font-size: 12px; color: var(--muted); text-align: right; }
    .buy-badge {
      font-size: 11px; padding: 4px 10px; border-radius: 999px;
      background: var(--mint); color: white; font-weight: 700; flex-shrink: 0;
    }
    .empty-text { color: var(--muted); font-size: 14px; padding: 20px 4px; }
  </style>
</head>
<body>
  {% include "_sidebar.html" %}
  <h1>음료 인기순위</h1>
  <div class="sub-note" id="refreshedNote">전 가맹점 합산 · 매일 자동 갱신</div>
  <div id="list"></div>

      </div>
    </div>

  <script>
    async function load() {
      const listEl = document.getElementById("list");
      listEl.innerHTML = '<div class="empty-text">불러오는 중...</div>';

      const res = await fetch("/api/beverage-ranking");
      const data = await res.json();
      const items = data.items || [];

      if (items.length === 0) {
        listEl.innerHTML = '<div class="empty-text">아직 집계된 음료 판매 데이터가 없습니다.</div>';
        return;
      }

      if (items[0].refreshed_at) {
        document.getElementById("refreshedNote").textContent =
          `전 가맹점 합산 · 최근 갱신 ${items[0].refreshed_at} (매일 자동 갱신됩니다)`;
      }

      listEl.innerHTML = items.map((item, i) => {
        const name = item.item_name || "(이름 없음)";
        const inner = `
          <div class="rank ${i < 3 ? "top3" : ""}">${item.rank}</div>
          <div class="item-name">${name}</div>
          <div class="item-sub">누적 ${(item.total_qty || 0).toLocaleString()}개<br>${item.store_count}개 지점</div>
          ${item.partners_link ? '<span class="buy-badge">구매하기</span>' : ""}
        `;
        return item.partners_link
          ? `<a class="item-row" href="${item.partners_link}" target="_blank" rel="noopener">${inner}</a>`
          : `<div class="item-row">${inner}</div>`;
      }).join("");
    }

    load();
  </script>
</body>
</html>
