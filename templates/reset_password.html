<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>비밀번호 재설정</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { --bg: #f8faf9; --card: #ffffff; --text: #111827; --muted: #6b7280; --line: #e5e7eb; --mint: #14b8a6; }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, "Pretendard", "Malgun Gothic", sans-serif;
      display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px;
    }
    .box { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 28px; width: 100%; max-width: 360px; }
    h1 { font-size: 19px; margin: 0 0 20px; text-align: center; }
    input {
      width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 8px;
      font-size: 14px; margin-bottom: 10px;
    }
    button {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      background: var(--mint); color: white; font-weight: 700; font-size: 15px; cursor: pointer;
    }
    .error-text { color: #b91c1c; font-size: 13px; margin-bottom: 10px; min-height: 16px; }
    .success-text { color: #047857; font-size: 13px; margin-bottom: 10px; min-height: 16px; }
    .switch-link { text-align: center; margin-top: 16px; font-size: 13px; color: var(--muted); }
    .switch-link a { color: var(--mint); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="box">
    <h1>비밀번호 재설정</h1>
    <div class="error-text" id="error"></div>
    <div class="success-text" id="success"></div>
    <input id="password" type="password" placeholder="새 비밀번호 (6자 이상)" autocomplete="new-password">
    <input id="password2" type="password" placeholder="새 비밀번호 확인" autocomplete="new-password">
    <button id="resetBtn">비밀번호 변경</button>
    <div class="switch-link"><a href="/login">로그인으로 돌아가기</a></div>
  </div>

  <script>
    const token = {{ token | tojson }};

    async function doReset() {
      const password = document.getElementById("password").value;
      const password2 = document.getElementById("password2").value;
      const errorEl = document.getElementById("error");
      const successEl = document.getElementById("success");
      errorEl.textContent = "";
      successEl.textContent = "";

      if (!token) {
        errorEl.textContent = "유효하지 않은 링크입니다.";
        return;
      }
      if (!password || password.length < 6) {
        errorEl.textContent = "비밀번호는 6자 이상이어야 합니다.";
        return;
      }
      if (password !== password2) {
        errorEl.textContent = "비밀번호가 일치하지 않습니다.";
        return;
      }

      const btn = document.getElementById("resetBtn");
      btn.disabled = true;
      const res = await fetch("/api/auth/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, password }),
      });
      const data = await res.json();
      btn.disabled = false;

      if (data.ok) {
        successEl.textContent = data.message + " 잠시 후 로그인 화면으로 이동합니다.";
        setTimeout(() => { window.location.href = "/login"; }, 1500);
      } else {
        errorEl.textContent = data.message || "변경에 실패했습니다.";
      }
    }

    document.getElementById("resetBtn").addEventListener("click", doReset);
  </script>
</body>
</html>
