<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>장바구니</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f8faf9; --card: #ffffff; --text: #111827; --muted: #6b7280;
      --line: #e5e7eb; --mint: #14b8a6; --mint-soft: #ccfbf1; --mint-text: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, "Pretendard", "Malgun Gothic", sans-serif;
    }
    .app-main { padding-bottom: 80px; }
    h1 { font-size: 20px; margin: 0 0 6px; }
    .sub-note { font-size: 12px; color: var(--muted); margin: 0 0 16px; }
    .top-actions { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }
    .primary-btn {
      padding: 11px 20px; border: none; border-radius: 10px; font-size: 14px;
      font-weight: 700; cursor: pointer; background: var(--mint); color: white;
    }
    .primary-btn:disabled { background: #a7f3d0; cursor: default; }
    .top-status { font-size: 12px; color: var(--muted); }
    .vendor-group {
      background: var(--card); border: 1px solid var(--line); border-radius: 12px;
      margin-bottom: 14px; overflow: hidden;
    }
    .vendor-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px; border-bottom: 1px solid var(--line); background: var(--bg);
    }
    .vendor-name { font-weight: 800; font-size: 14px; }
    .vendor-btn {
      padding: 7px 14px; border: none; border-radius: 8px; font-size: 12px;
      font-weight: 700; cursor: pointer; background: var(--text); color: white;
    }
    .vendor-btn:disabled { opacity: 0.6; cursor: default; }
    .item-row {
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--line);
    }
    .item-row:last-child { border-bottom: none; }
    .item-name { font-size: 13px; font-weight: 600; }
    .item-price { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .item-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .qty-input {
      width: 48px; padding: 6px; border: 1px solid var(--line);
      border-radius: 6px; text-align: center; font-size: 13px;
    }
    .item-btn {
      padding: 6px 12px; border: none; border-radius: 6px; font-size: 12px;
      font-weight: 700; cursor: pointer; background: var(--mint); color: white;
    }
    .item-btn:disabled { opacity: 0.6; cursor: default; }
    .remove-btn {
      padding: 6px 10px; border: none; border-radius: 6px; font-size: 12px;
      font-weight: 700; cursor: pointer; background: #fee2e2; color: #b91c1c;
    }
    .item-status { font-size: 11px; color: var(--muted); width: 100%; margin-top: 4px; }
    .item-status.error { color: #b91c1c; }
    .item-status.switched { color: var(--mint-text); }
    .alt-offers { width: 100%; margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
    .alt-btn {
      padding: 5px 10px; border: 1px solid var(--line); border-radius: 999px;
      font-size: 11px; font-weight: 700; cursor: pointer; background: var(--card); color: var(--text);
    }
    .alt-btn:disabled { opacity: 0.6; cursor: default; }
    .empty-text { color: var(--muted); font-size: 14px; padding: 20px 4px; }
  </style>
</head>
<body>
  {% include "_sidebar.html" %}
  <h1>장바구니</h1>
  <div class="sub-note">여기 담긴 상품은 아직 도매몰 실제 장바구니에는 담기지 않았습니다. 아래 버튼으로 실제 담기를 실행하세요.</div>
  <div class="top-actions">
    <button class="primary-btn" id="addAllBtn">전체 도매몰에 담기</button>
    <button class="remove-btn" id="removeAllBtn">전체 삭제</button>
    <span class="top-status" id="topStatus"></span>
  </div>
  <div id="list"></div>

      </div>
    </div>

  <script>
    let allItems = [];

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    async function loadCart() {
      const res = await fetch("/api/isorder-cart");
      if (res.status === 401) { window.location.href = "/login"; return; }
      const data = await res.json();
      allItems = data.items || [];
      render();
    }

    function groupByVendor(items) {
      const groups = new Map();
      for (const it of items) {
        if (!groups.has(it.vendor_id)) groups.set(it.vendor_id, []);
        groups.get(it.vendor_id).push(it);
      }
      return groups;
    }

    // 상태 문구/대안 목록은 아이템 객체 자체(_status, _statusClass, _pendingAlts)에
    // 저장해둔다 - render()가 매번 목록을 통째로 새로 그리기 때문에, DOM에만 있는
    // 상태는 다음 render() 호출에서 사라져버린다.
    function render() {
      const listEl = document.getElementById("list");
      if (allItems.length === 0) {
        listEl.innerHTML = '<div class="empty-text">장바구니가 비어있습니다. 가격비교 페이지에서 상품을 담아보세요.</div>';
        return;
      }

      const groups = groupByVendor(allItems);
      let html = "";
      for (const [vendorId, items] of groups) {
        const vendorName = items[0].vendor_name || vendorId;
        const rows = items.map((it) => {
          const altHtml = (it._pendingAlts && it._pendingAlts.length > 0) ? `
            <div class="alt-offers">
              ${it._pendingAlts.map((o, i) => `
                <button class="alt-btn" data-alt-index="${i}">${escapeHtml(o.vendor_name)} ${o.price ? o.price.toLocaleString() + "원" : ""}</button>
              `).join("")}
            </div>
          ` : "";

          // 도매처에 계정이 2개 이상 등록돼 있으면 서버가 실행 대신 계정 목록을
          // 돌려준다 - 아래 버튼으로 고르면 그 account_id로 다시 호출해서 실행한다.
          const accountChoiceHtml = (it._pendingAccounts && it._pendingAccounts.length > 0) ? `
            <div class="alt-offers">
              <span class="item-status">어떤 계정으로 담을까요?</span>
              ${it._pendingAccounts.map((acc, i) => `
                <button class="alt-btn account-choice-btn" data-account-index="${i}">${escapeHtml(acc.nickname)}${acc.is_default ? " (기본)" : ""}</button>
              `).join("")}
            </div>
          ` : "";

          const altAccountChoiceHtml = it._altAccountChoice ? `
            <div class="alt-offers">
              <span class="item-status">${escapeHtml(it._altAccountChoice.altOffer.vendor_name)}의 어떤 계정으로 담을까요?</span>
              ${it._altAccountChoice.accounts.map((acc, i) => `
                <button class="alt-btn alt-account-choice-btn" data-account-index="${i}">${escapeHtml(acc.nickname)}${acc.is_default ? " (기본)" : ""}</button>
              `).join("")}
            </div>
          ` : "";

          return `
          <div class="item-row" data-item-id="${it.id}">
            <div class="item-info" style="flex:1;min-width:0;">
              <div class="item-name">${escapeHtml(it.item_name)}</div>
              <div class="item-price">${it.price ? (it.price.toLocaleString() + "원") : "가격 확인 필요"} · 담은 시각 ${escapeHtml(it.added_at)}</div>
              <div class="item-status ${it._statusClass || ""}">${escapeHtml(it._status || "")}</div>
              ${altHtml}
              ${accountChoiceHtml}
              ${altAccountChoiceHtml}
            </div>
            <div class="item-actions">
              <input type="number" class="qty-input" value="${it.qty}" min="1" max="99">
              <button class="item-btn">담기</button>
              <button class="remove-btn">삭제</button>
            </div>
          </div>
        `;
        }).join("");

        html += `
          <div class="vendor-group" data-vendor-id="${escapeHtml(vendorId)}">
            <div class="vendor-head">
              <span class="vendor-name">${escapeHtml(vendorName)} (${items.length}개)</span>
              <button class="vendor-btn">이 도매처 전체 담기</button>
            </div>
            ${rows}
          </div>
        `;
      }
      listEl.innerHTML = html;
    }

    function setItemStatus(item, text, cls) {
      item._status = text;
      item._statusClass = cls || "";
    }

    // 실제 담기는 별도 워커 프로세스가 처리한다(웹 서버는 큐에 등록만 함) -
    // job_id를 받아서 완료될 때까지 주기적으로 상태를 물어본다.
    async function pollJob(jobId, intervalMs = 1500, maxAttempts = 200) {
      for (let i = 0; i < maxAttempts; i++) {
        const res = await fetch(`/api/cart-jobs/${jobId}`);
        if (res.status === 401) { window.location.href = "/login"; return { status: "failed", result: { ok: false, reason: "로그인이 필요합니다." } }; }
        const data = await res.json();
        if (data.status === "done" || data.status === "failed") return data;
        await new Promise((resolve) => setTimeout(resolve, intervalMs));
      }
      return { status: "failed", result: { ok: false, reason: "처리 시간이 너무 오래 걸립니다. 잠시 후 새로고침해서 확인해주세요." } };
    }

    // 선택한 도매처가 품절이면, 지금 장바구니에 이미 담긴 다른 상품들이 쓰는
    // 도매처 중에서만 서버가 자동으로 전환을 시도한다(텔레그램 봇과 동일한 로직).
    // 그래도 다 품절이면 remaining_alts를 받아서 화면에 대안으로 보여준다.
    async function addOneToRealCart(itemId, accountId) {
      const item = allItems.find((it) => it.id === itemId);
      if (!item) return { ok: false, reason: "이미 처리됨" };

      const row = document.querySelector(`.item-row[data-item-id="${itemId}"]`);
      const qty = parseInt(row.querySelector(".qty-input").value, 10) || 1;

      setItemStatus(item, "담는 중...");
      item._pendingAccounts = null;
      render();

      try {
        if (qty !== item.qty) {
          await fetch(`/api/isorder-cart/${itemId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ qty }),
          });
          item.qty = qty;
        }

        const res = await fetch(`/api/isorder-cart/${itemId}/add-to-vendor`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ account_id: accountId ?? null }),
        });
        const enqueued = await res.json();

        if (enqueued.needs_account_choice) {
          item._pendingAccounts = enqueued.accounts;
          setItemStatus(item, "");
          return enqueued;
        }
        if (!enqueued.ok || !enqueued.job_id) {
          setItemStatus(item, `실패: ${enqueued.reason || ""}`, "error");
          return enqueued;
        }

        const { result: data } = await pollJob(enqueued.job_id);

        if (data.ok) {
          const switchedNote = data.switched ? ` (※최초 선택하신 도매처가 품절이라 ${data.used_vendor_name}(으)로 자동 변경됨)` : "";
          allItems = allItems.filter((it) => it.id !== itemId);
          if (data.switched) {
            document.getElementById("topStatus").textContent = `${item.item_name}: 담기 완료${switchedNote}`;
          }
        } else if (data.remaining_alts && data.remaining_alts.length > 0) {
          setItemStatus(item, `이번 장바구니에 포함된 도매처 모두 품절: ${data.reason || ""} - 다른 도매처를 골라주세요`, "error");
          item._pendingAlts = data.remaining_alts;
        } else {
          setItemStatus(item, `실패: ${data.reason || ""}`, "error");
        }
        return data;
      } catch (e) {
        setItemStatus(item, "담기 중 오류 발생", "error");
        return { ok: false, reason: "오류" };
      } finally {
        render();
      }
    }

    async function addAltToRealCart(itemId, altOffer, accountId) {
      const item = allItems.find((it) => it.id === itemId);
      if (!item) return;
      const row = document.querySelector(`.item-row[data-item-id="${itemId}"]`);
      const qty = parseInt(row.querySelector(".qty-input").value, 10) || 1;

      setItemStatus(item, "담는 중...");
      item._altAccountChoice = null;
      render();

      try {
        const res = await fetch("/api/cart-add", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            vendor_id: altOffer.vendor_id, product_url: altOffer.product_url,
            qty, item_name: item.item_name, item_key: altOffer.item_key,
            account_id: accountId ?? null,
          }),
        });
        const enqueued = await res.json();

        if (enqueued.needs_account_choice) {
          item._altAccountChoice = { altOffer, accounts: enqueued.accounts };
          setItemStatus(item, "");
          return;
        }
        if (!enqueued.ok || !enqueued.job_id) {
          setItemStatus(item, `${altOffer.vendor_name} 실패: ${enqueued.reason || ""}`, "error");
          return;
        }

        const { result: data } = await pollJob(enqueued.job_id);

        if (data.ok) {
          await fetch(`/api/isorder-cart/${itemId}`, { method: "DELETE" });
          allItems = allItems.filter((it) => it.id !== itemId);
        } else {
          setItemStatus(item, `${altOffer.vendor_name} 실패: ${data.reason || ""}`, "error");
        }
      } catch (e) {
        setItemStatus(item, "담기 중 오류 발생", "error");
      } finally {
        render();
      }
    }

    document.getElementById("list").addEventListener("click", async (e) => {
      const itemRow = e.target.closest(".item-row");

      if (e.target.classList.contains("remove-btn") && itemRow) {
        const itemId = parseInt(itemRow.dataset.itemId, 10);
        e.target.disabled = true;
        await fetch(`/api/isorder-cart/${itemId}`, { method: "DELETE" });
        allItems = allItems.filter((it) => it.id !== itemId);
        render();
        return;
      }

      if (e.target.classList.contains("account-choice-btn") && itemRow) {
        const itemId = parseInt(itemRow.dataset.itemId, 10);
        const item = allItems.find((it) => it.id === itemId);
        const accountIndex = parseInt(e.target.dataset.accountIndex, 10);
        const account = item && item._pendingAccounts ? item._pendingAccounts[accountIndex] : null;
        if (!account) return;
        e.target.disabled = true;
        await addOneToRealCart(itemId, account.id);
        return;
      }

      if (e.target.classList.contains("alt-account-choice-btn") && itemRow) {
        const itemId = parseInt(itemRow.dataset.itemId, 10);
        const item = allItems.find((it) => it.id === itemId);
        const accountIndex = parseInt(e.target.dataset.accountIndex, 10);
        const choice = item && item._altAccountChoice;
        const account = choice ? choice.accounts[accountIndex] : null;
        if (!account) return;
        e.target.disabled = true;
        await addAltToRealCart(itemId, choice.altOffer, account.id);
        return;
      }

      if (e.target.classList.contains("alt-btn") && itemRow) {
        const itemId = parseInt(itemRow.dataset.itemId, 10);
        const item = allItems.find((it) => it.id === itemId);
        const altIndex = parseInt(e.target.dataset.altIndex, 10);
        const altOffer = item && item._pendingAlts ? item._pendingAlts[altIndex] : null;
        if (!altOffer) return;
        e.target.disabled = true;
        await addAltToRealCart(itemId, altOffer);
        return;
      }

      if (e.target.classList.contains("item-btn") && itemRow) {
        const itemId = parseInt(itemRow.dataset.itemId, 10);
        e.target.disabled = true;
        await addOneToRealCart(itemId);
        return;
      }

      const vendorGroup = e.target.closest(".vendor-group");
      if (e.target.classList.contains("vendor-btn") && vendorGroup) {
        const vendorId = vendorGroup.dataset.vendorId;
        e.target.disabled = true;
        const ids = allItems.filter((it) => it.vendor_id === vendorId).map((it) => it.id);
        for (const id of ids) {
          await addOneToRealCart(id);
        }
      }
    });

    document.getElementById("addAllBtn").addEventListener("click", async () => {
      const btn = document.getElementById("addAllBtn");
      const statusEl = document.getElementById("topStatus");
      btn.disabled = true;
      const total = allItems.length;
      let done = 0;
      for (const item of [...allItems]) {
        statusEl.textContent = `처리 중... (${done}/${total})`;
        await addOneToRealCart(item.id);
        done += 1;
      }
      statusEl.textContent = `완료 (${done}/${total})`;
      btn.disabled = false;
    });

    document.getElementById("removeAllBtn").addEventListener("click", async () => {
      if (allItems.length === 0) return;
      if (!confirm(`장바구니에 담긴 ${allItems.length}개 상품을 전부 삭제할까요? (실제 도매몰에는 담기지 않습니다)`)) return;
      const btn = document.getElementById("removeAllBtn");
      btn.disabled = true;
      await fetch("/api/isorder-cart", { method: "DELETE" });
      allItems = [];
      render();
      btn.disabled = false;
    });

    loadCart();
  </script>
</body>
</html>
