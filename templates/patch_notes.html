<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>패치노트</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f8faf9; --card: #ffffff; --text: #111827; --muted: #6b7280;
      --line: #e5e7eb; --mint: #14b8a6; --mint-soft: #ccfbf1; --mint-text: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, "Pretendard", "Malgun Gothic", sans-serif;
    }
    .app-main { padding-bottom: 80px; }
    h1 { font-size: 20px; margin: 0 0 6px; }
    .sub-note { font-size: 12px; color: var(--muted); margin: 0 0 20px; }
    .note-list { position: relative; }
    h2.section-title { font-size: 16px; margin: 40px 0 6px; }
    h2.section-title:first-of-type { margin-top: 0; }
    .empty-text { color: var(--muted); font-size: 14px; padding: 20px 4px; }

    /* 카드(details) - 접었을 땐 한 줄, 펼치면 전체 내용 */
    .note-card {
      background: var(--card); border: 1px solid var(--line); border-radius: 12px;
      margin-bottom: 10px; overflow: hidden;
    }
    .note-card > summary {
      list-style: none; cursor: pointer; padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .note-card > summary::-webkit-details-marker { display: none; }
    .note-card > summary .chevron {
      flex-shrink: 0; width: 14px; height: 14px; color: var(--muted);
      transition: transform .15s;
    }
    .note-card[open] > summary .chevron { transform: rotate(90deg); }
    /* 일부 브라우저(임베디드 웹뷰 등)는 details 기본 UA 스타일시트가
       내용을 자동으로 숨기지 않는 경우가 있어, 명시적으로 접힘/펼침을
       강제한다 - 네이티브 동작에만 기대면 조용히 항상 펼쳐진 채로
       보일 위험이 있다. */
    .note-card:not([open]) > .note-full { display: none; }
    .note-card[open] > .note-full { display: block; }
    .note-version {
      flex-shrink: 0; font-size: 12px; font-weight: 800; color: var(--mint-text);
      background: var(--mint-soft); padding: 3px 10px; border-radius: 999px;
    }
    .note-date { flex-shrink: 0; font-size: 12px; color: var(--muted); }
    .note-oneline {
      font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; min-width: 0; flex: 1;
    }
    .note-badge {
      flex-shrink: 0; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 999px;
      background: #f3f4f6; color: var(--muted);
    }
    .note-badge.read { background: var(--mint-soft); color: var(--mint-text); }
    .note-full {
      padding: 0 16px 16px; font-size: 14px; line-height: 1.6; white-space: pre-line;
      border-top: 1px solid var(--line); padding-top: 12px; margin: 0 16px 16px;
    }

    .suggestion-form {
      background: var(--card); border: 1px solid var(--line); border-radius: 12px;
      padding: 16px 18px; margin-bottom: 16px;
    }
    .suggestion-form textarea {
      width: 100%; min-height: 90px; padding: 10px 12px; border: 1px solid var(--line);
      border-radius: 8px; font-size: 13px; font-family: inherit; resize: vertical; box-sizing: border-box;
    }
    .suggestion-submit-btn {
      margin-top: 10px; padding: 9px 18px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 700; cursor: pointer; background: var(--mint); color: white;
    }
    .suggestion-status-text { font-size: 12px; color: var(--muted); margin-top: 8px; }
    .suggestion-status-text.error { color: #b91c1c; }
  </style>
</head>
<body>
  {% include "_sidebar.html" %}

  <h2 class="section-title">공지사항</h2>
  <div class="sub-note">대표님이 전체 가맹점에 안내하는 공지입니다.</div>
  <div id="announcementList" class="note-list"></div>

  <h2 class="section-title">패치노트</h2>
  <div class="sub-note">기능 업데이트 내역을 최신순으로 보여줍니다.</div>
  <div id="list" class="note-list"></div>

  <h2 class="section-title">제안하기</h2>
  <div class="sub-note">건의사항이나 불편한 점을 자유롭게 남겨주세요. 대표님만 볼 수 있습니다.</div>
  <div class="suggestion-form">
    <textarea id="suggestionInput" placeholder="예: 재고 부족 알림을 텔레그램으로도 받고 싶어요."></textarea>
    <div>
      <button class="suggestion-submit-btn" id="suggestionSubmitBtn">제출</button>
      <span class="suggestion-status-text" id="suggestionStatus"></span>
    </div>
  </div>
  <div class="sub-note" style="margin-bottom:8px;">내가 제출한 제안</div>
  <div id="mySuggestionList" class="note-list"></div>

      </div>
    </div>

  <script>
    const CHEVRON_SVG = '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>';

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function oneLine(text, maxLen) {
      const firstLine = String(text ?? "").split("\n")[0].trim();
      if (!firstLine) return "";
      return firstLine.length > maxLen ? firstLine.slice(0, maxLen) + "…" : firstLine;
    }

    async function load() {
      const listEl = document.getElementById("list");
      const res = await fetch("/api/patch-notes");
      const data = await res.json();
      const items = data.items || [];

      if (items.length === 0) {
        listEl.innerHTML = '<div class="empty-text">아직 등록된 패치노트가 없습니다.</div>';
        return;
      }

      listEl.innerHTML = items.map((item) => `
        <details class="note-card">
          <summary>
            ${CHEVRON_SVG}
            <span class="note-version">${escapeHtml(item.version)}</span>
            <span class="note-date">${escapeHtml(item.created_at)}</span>
            <span class="note-oneline">${escapeHtml(oneLine(item.summary, 40))}</span>
          </summary>
          <div class="note-full">${escapeHtml(item.summary)}</div>
        </details>
      `).join("");
    }

    async function loadAnnouncements() {
      const listEl = document.getElementById("announcementList");
      const res = await fetch("/api/announcements");
      const data = await res.json();
      const items = data.items || [];

      if (items.length === 0) {
        listEl.innerHTML = '<div class="empty-text">아직 등록된 공지사항이 없습니다.</div>';
        return;
      }

      listEl.innerHTML = items.map((item) => `
        <details class="note-card">
          <summary>
            ${CHEVRON_SVG}
            <span class="note-date">${escapeHtml(item.created_at)}</span>
            <span class="note-oneline"><b>${escapeHtml(item.title)}</b> - ${escapeHtml(oneLine(item.content, 30))}</span>
          </summary>
          <div class="note-full">${escapeHtml(item.content)}</div>
        </details>
      `).join("");
    }

    async function loadMySuggestions() {
      const listEl = document.getElementById("mySuggestionList");
      const res = await fetch("/api/suggestions/mine");
      const data = await res.json();
      const items = data.items || [];

      if (items.length === 0) {
        listEl.innerHTML = '<div class="empty-text">아직 제출한 제안이 없습니다.</div>';
        return;
      }

      listEl.innerHTML = items.map((item) => `
        <details class="note-card">
          <summary>
            ${CHEVRON_SVG}
            <span class="note-date">${escapeHtml(item.created_at)}</span>
            <span class="note-oneline">${escapeHtml(oneLine(item.content, 40))}</span>
            <span class="note-badge ${item.status === 'read' ? 'read' : ''}">${item.status === 'read' ? '확인함' : '확인 전'}</span>
          </summary>
          <div class="note-full">${escapeHtml(item.content)}</div>
        </details>
      `).join("");
    }

    async function submitSuggestion() {
      const input = document.getElementById("suggestionInput");
      const statusEl = document.getElementById("suggestionStatus");
      const btn = document.getElementById("suggestionSubmitBtn");
      const content = input.value.trim();

      if (!content) {
        statusEl.textContent = "내용을 입력해주세요.";
        statusEl.classList.add("error");
        return;
      }

      btn.disabled = true;
      statusEl.textContent = "제출 중...";
      statusEl.classList.remove("error");
      try {
        const res = await fetch("/api/suggestions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content }),
        });
        const data = await res.json();
        if (data.ok) {
          input.value = "";
          statusEl.textContent = "제출 완료. 소중한 의견 감사합니다.";
          await loadMySuggestions();
        } else {
          statusEl.textContent = data.detail || "제출 실패";
          statusEl.classList.add("error");
        }
      } catch (err) {
        statusEl.textContent = "제출 중 오류 발생";
        statusEl.classList.add("error");
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById("suggestionSubmitBtn").addEventListener("click", submitSuggestion);

    load();
    loadAnnouncements();
    loadMySuggestions();
  </script>
</body>
</html>
