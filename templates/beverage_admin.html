<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>음료 링크 관리</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f8faf9; --card: #ffffff; --text: #111827; --muted: #6b7280;
      --line: #e5e7eb; --mint: #14b8a6; --mint-soft: #ccfbf1; --mint-text: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, "Pretendard", "Malgun Gothic", sans-serif;
      padding: 24px 16px 80px;
    }
    h1 { font-size: 20px; margin: 0 0 6px; }
    .hint-text { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
    .filter-row { margin-bottom: 16px; }
    .filter-row input {
      width: 100%; max-width: 360px; padding: 10px 12px; border: 1px solid var(--line);
      border-radius: 8px; font-size: 13px;
    }
    .bev-row {
      background: var(--card); border: 1px solid var(--line); border-radius: 12px;
      padding: 12px 14px; margin-bottom: 10px; display: flex; gap: 12px; align-items: flex-start;
    }
    .bev-row.locked { border-color: var(--mint); }
    .thumb {
      width: 56px; height: 56px; border-radius: 8px; background: #f3f4f6;
      flex-shrink: 0; object-fit: contain; border: 1px solid var(--line);
    }
    .thumb-placeholder {
      width: 56px; height: 56px; border-radius: 8px; background: #f3f4f6;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 10px; border: 1px solid var(--line);
    }
    .bev-main { flex: 1; min-width: 0; }
    .bev-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .bev-name { font-weight: 700; font-size: 13px; }
    .badge {
      font-size: 10px; padding: 2px 7px; border-radius: 999px; font-weight: 700;
      background: #f3f4f6; color: var(--muted); flex-shrink: 0;
    }
    .badge.locked { background: var(--mint); color: white; }
    .badge.auto { background: var(--mint-soft); color: var(--mint-text); }
    .edit-row { display: flex; gap: 6px; margin-bottom: 6px; }
    .edit-row input {
      flex: 1; padding: 7px 9px; border: 1px solid var(--line);
      border-radius: 6px; font-size: 12px;
    }
    .edit-row button {
      padding: 7px 12px; border: none; border-radius: 6px; font-size: 12px;
      font-weight: 700; cursor: pointer; background: var(--text); color: white; flex-shrink: 0;
    }
    .preview-box {
      display: none; background: var(--bg); border: 1px dashed var(--line); border-radius: 8px;
      padding: 8px 10px; font-size: 12px; margin-bottom: 6px; align-items: center; gap: 10px;
    }
    .preview-box.show { display: flex; }
    .preview-box img { width: 40px; height: 40px; object-fit: contain; border-radius: 6px; background: white; }
    .preview-box .confirm-btn {
      padding: 6px 12px; border: none; border-radius: 6px; font-size: 12px;
      font-weight: 700; cursor: pointer; background: var(--mint); color: white; margin-left: auto;
    }
    .status-text { font-size: 11px; color: var(--muted); }
    .status-text.error { color: #b91c1c; }
    .empty-text { color: var(--muted); font-size: 14px; padding: 20px 4px; }
  </style>
</head>
<body>
  <h1>음료 링크 관리</h1>
  <div class="hint-text">
    검색어를 입력하고 "미리보기"로 실제 매칭되는 상품을 확인한 뒤, 맞으면 "확정"을 눌러 저장하세요.
    확정된 항목(초록 배지)은 이후 자동 갱신에서 다시 검색되지 않습니다.
  </div>
  <div class="filter-row">
    <input id="filterInput" type="text" placeholder="상품명으로 목록 필터링..." />
  </div>
  <div id="list"></div>

  <script>
    let allItems = [];

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    async function loadItems() {
      const res = await fetch("/admin/api/beverages");
      const data = await res.json();
      if (!data.ok) {
        document.getElementById("list").innerHTML = `<div class="empty-text">${escapeHtml(data.error || "불러오기 실패")}</div>`;
        return;
      }
      allItems = data.items;
      render();
    }

    function render() {
      const filterText = document.getElementById("filterInput").value.trim().toLowerCase();
      const listEl = document.getElementById("list");
      const items = allItems.filter((it) => !filterText || it.item_name.toLowerCase().includes(filterText));

      if (items.length === 0) {
        listEl.innerHTML = '<div class="empty-text">일치하는 상품이 없습니다.</div>';
        return;
      }

      listEl.innerHTML = items.map((it) => {
        const thumb = it.image_url
          ? `<img class="thumb" src="${escapeHtml(it.image_url)}" alt="">`
          : `<div class="thumb-placeholder">이미지<br>없음</div>`;
        const badge = it.manual_override
          ? '<span class="badge locked">수동확인</span>'
          : (it.reference_url ? '<span class="badge auto">자동매칭</span>' : '<span class="badge">미완료</span>');
        const priceText = it.price ? `${it.price.toLocaleString()}원` : "가격 없음";

        return `
          <div class="bev-row ${it.manual_override ? "locked" : ""}" data-item-key="${escapeHtml(it.item_key)}">
            ${thumb}
            <div class="bev-main">
              <div class="bev-name-row">
                <span class="bev-name">${escapeHtml(it.item_name)}</span>
                ${badge}
                <span class="status-text">${priceText}</span>
              </div>
              <div class="edit-row">
                <input type="text" class="keyword-input" value="${escapeHtml(it.item_name)}" placeholder="검색어" />
                <button class="preview-btn">미리보기</button>
              </div>
              <div class="preview-box">
                <img class="preview-img" src="" alt="">
                <span class="preview-text"></span>
                <button class="confirm-btn">이걸로 확정</button>
              </div>
              <div class="status-text"></div>
            </div>
          </div>
        `;
      }).join("");
    }

    document.getElementById("filterInput").addEventListener("input", render);

    document.getElementById("list").addEventListener("click", async (e) => {
      const row = e.target.closest(".bev-row");
      if (!row) return;
      const itemKey = row.dataset.itemKey;
      const item = allItems.find((it) => it.item_key === itemKey);
      const statusEl = row.querySelector(".status-text:last-child");
      const previewBox = row.querySelector(".preview-box");

      if (e.target.classList.contains("preview-btn")) {
        const keyword = row.querySelector(".keyword-input").value.trim();
        if (!keyword) return;
        e.target.disabled = true;
        statusEl.textContent = "조회 중...";
        statusEl.classList.remove("error");
        try {
          const res = await fetch("/admin/api/beverages/preview", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ keyword }),
          });
          const data = await res.json();
          if (!data.ok) {
            statusEl.textContent = data.error || "조회 실패";
            statusEl.classList.add("error");
            previewBox.classList.remove("show");
          } else {
            previewBox.querySelector(".preview-img").src = data.image_url || "";
            previewBox.querySelector(".preview-text").textContent =
              `${data.price ? data.price.toLocaleString() + "원" : "가격 확인 필요"}`;
            previewBox.dataset.imageUrl = data.image_url || "";
            previewBox.dataset.price = data.price || "";
            previewBox.dataset.referenceUrl = data.reference_url || "";
            previewBox.classList.add("show");
            statusEl.textContent = "";
          }
        } catch (err) {
          statusEl.textContent = "조회 중 오류 발생";
          statusEl.classList.add("error");
        } finally {
          e.target.disabled = false;
        }
        return;
      }

      if (e.target.classList.contains("confirm-btn")) {
        e.target.disabled = true;
        statusEl.textContent = "저장 중...";
        statusEl.classList.remove("error");
        try {
          const res = await fetch("/admin/api/beverages/confirm", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              item_key: itemKey,
              item_name: item.item_name,
              image_url: previewBox.dataset.imageUrl || "",
              price: previewBox.dataset.price ? parseInt(previewBox.dataset.price, 10) : null,
              reference_url: previewBox.dataset.referenceUrl,
            }),
          });
          const data = await res.json();
          if (data.ok) {
            statusEl.textContent = "저장 완료";
            await loadItems();
          } else {
            statusEl.textContent = data.error || "저장 실패";
            statusEl.classList.add("error");
          }
        } catch (err) {
          statusEl.textContent = "저장 중 오류 발생";
          statusEl.classList.add("error");
        } finally {
          e.target.disabled = false;
        }
      }
    });

    loadItems();
  </script>
</body>
</html>
