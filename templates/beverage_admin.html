<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>음료 링크 관리</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f8faf9; --card: #ffffff; --text: #111827; --muted: #6b7280;
      --line: #e5e7eb; --mint: #14b8a6; --mint-soft: #ccfbf1; --mint-text: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, "Pretendard", "Malgun Gothic", sans-serif;
      padding: 24px 16px 80px;
    }
    h1 { font-size: 20px; margin: 0 0 6px; }
    .hint-text { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
    .top-row { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
    .top-row input {
      flex: 1; max-width: 360px; padding: 10px 12px; border: 1px solid var(--line);
      border-radius: 8px; font-size: 13px;
    }
    .add-btn {
      padding: 10px 16px; border: none; border-radius: 8px; font-size: 13px;
      font-weight: 700; cursor: pointer; background: var(--mint); color: white; flex-shrink: 0;
    }
    .bev-row {
      background: var(--card); border: 1px solid var(--line); border-radius: 12px;
      padding: 12px 14px; margin-bottom: 10px; display: flex; gap: 12px; align-items: flex-start;
    }
    .bev-row.locked { border-color: var(--mint); }
    .thumb {
      width: 56px; height: 56px; border-radius: 8px; background: #f3f4f6;
      flex-shrink: 0; object-fit: contain; border: 1px solid var(--line);
    }
    .thumb-placeholder {
      width: 56px; height: 56px; border-radius: 8px; background: #f3f4f6;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 10px; border: 1px solid var(--line); text-align: center;
    }
    .bev-main { flex: 1; min-width: 0; }
    .bev-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .bev-name { font-weight: 700; font-size: 13px; }
    .bev-name-input {
      font-weight: 700; font-size: 13px; padding: 5px 7px; border: 1px solid var(--line);
      border-radius: 6px; flex: 1; max-width: 220px;
    }
    .badge {
      font-size: 10px; padding: 2px 7px; border-radius: 999px; font-weight: 700;
      background: #f3f4f6; color: var(--muted); flex-shrink: 0;
    }
    .badge.locked { background: var(--mint); color: white; }
    .badge.auto { background: var(--mint-soft); color: var(--mint-text); }
    .field-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
    .field-row label { font-size: 11px; color: var(--muted); width: 66px; flex-shrink: 0; }
    .field-row input {
      flex: 1; padding: 7px 9px; border: 1px solid var(--line);
      border-radius: 6px; font-size: 12px;
    }
    .field-row button {
      padding: 7px 12px; border: none; border-radius: 6px; font-size: 12px;
      font-weight: 700; cursor: pointer; flex-shrink: 0;
    }
    .search-btn { background: var(--text); color: white; }
    .save-btn { background: var(--mint); color: white; }
    .status-text { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .status-text.error { color: #b91c1c; }
    .empty-text { color: var(--muted); font-size: 14px; padding: 20px 4px; }
  </style>
</head>
<body>
  <h1>음료 링크 관리</h1>
  <div class="hint-text">
    "쿠팡 링크"는 직접 확인한 링크를 붙여넣고, "검색어"는 이미지를 가져올 검색어를 입력해 "이미지 검색"으로 미리 확인한 뒤 "저장"하세요.
    저장된 항목(초록 배지)은 이후 자동 갱신에서 다시 검색되지 않습니다.
  </div>
  <div class="top-row">
    <input id="filterInput" type="text" placeholder="상품명으로 목록 필터링..." />
    <button class="add-btn" id="addNewBtn">+ 새 음료 추가</button>
  </div>
  <div id="list"></div>

  <script>
    let allItems = [];
    let newItems = [];

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    async function loadItems() {
      const res = await fetch("/admin/api/beverages");
      const data = await res.json();
      if (!data.ok) {
        document.getElementById("list").innerHTML = `<div class="empty-text">${escapeHtml(data.error || "불러오기 실패")}</div>`;
        return;
      }
      allItems = data.items;
      newItems = [];
      render();
    }

    function renderRow(it, isNew) {
      const thumb = it.image_url
        ? `<img class="thumb" src="${escapeHtml(it.image_url)}" alt="">`
        : `<div class="thumb-placeholder">이미지<br>없음</div>`;
      const badge = it.manual_override
        ? '<span class="badge locked">저장됨</span>'
        : (it.reference_url ? '<span class="badge auto">자동매칭</span>' : '<span class="badge">미완료</span>');
      const priceText = it.price ? `${it.price.toLocaleString()}원` : "가격 없음";
      const nameField = isNew
        ? `<input type="text" class="bev-name-input" placeholder="상품명" value="">`
        : `<span class="bev-name">${escapeHtml(it.item_name)}</span>`;

      return `
        <div class="bev-row ${it.manual_override ? "locked" : ""}" data-item-key="${escapeHtml(it.item_key)}">
          ${thumb}
          <div class="bev-main">
            <div class="bev-name-row">
              ${nameField}
              ${badge}
              <span class="status-text" style="margin-top:0;">${priceText}</span>
            </div>
            <div class="field-row">
              <label>쿠팡 링크</label>
              <input type="text" class="link-input" placeholder="쿠팡 파트너스 링크" value="${escapeHtml(it.reference_url || "")}" />
            </div>
            <div class="field-row">
              <label>검색어</label>
              <input type="text" class="keyword-input" placeholder="이미지 검색용 검색어" value="${escapeHtml(it.item_name || "")}" />
              <button class="search-btn">이미지 검색</button>
              <button class="save-btn">저장</button>
            </div>
            <div class="status-text"></div>
          </div>
        </div>
      `;
    }

    function render() {
      const filterText = document.getElementById("filterInput").value.trim().toLowerCase();
      const listEl = document.getElementById("list");
      const items = allItems.filter((it) => !filterText || it.item_name.toLowerCase().includes(filterText));

      let html = newItems.map((it) => renderRow(it, true)).join("");
      html += items.map((it) => renderRow(it, false)).join("");

      listEl.innerHTML = html || '<div class="empty-text">일치하는 상품이 없습니다.</div>';
    }

    document.getElementById("filterInput").addEventListener("input", render);

    document.getElementById("addNewBtn").addEventListener("click", () => {
      const itemKey = "manual_" + (crypto.randomUUID ? crypto.randomUUID() : Date.now() + "_" + Math.random());
      newItems.unshift({ item_key: itemKey, item_name: "", image_url: "", price: null, reference_url: "", manual_override: false });
      render();
    });

    document.getElementById("list").addEventListener("click", async (e) => {
      const row = e.target.closest(".bev-row");
      if (!row) return;
      const itemKey = row.dataset.itemKey;
      const statusEl = row.querySelector(".bev-main > .status-text");
      const nameInput = row.querySelector(".bev-name-input");
      const linkInput = row.querySelector(".link-input");
      const keywordInput = row.querySelector(".keyword-input");
      const thumbImg = row.querySelector(".thumb");

      if (e.target.classList.contains("search-btn")) {
        const keyword = keywordInput.value.trim();
        if (!keyword) return;
        e.target.disabled = true;
        statusEl.textContent = "이미지 검색 중...";
        statusEl.classList.remove("error");
        try {
          const res = await fetch("/admin/api/beverages/preview", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ keyword }),
          });
          const data = await res.json();
          if (!data.ok) {
            statusEl.textContent = data.error || "검색 실패";
            statusEl.classList.add("error");
          } else {
            row.dataset.foundImageUrl = data.image_url || "";
            row.dataset.foundPrice = data.price || "";
            if (thumbImg) thumbImg.src = data.image_url || "";
            statusEl.textContent = `이미지 찾음 (${data.price ? data.price.toLocaleString() + "원" : "가격 확인 필요"}) - 저장을 눌러 반영하세요`;
          }
        } catch (err) {
          statusEl.textContent = "검색 중 오류 발생";
          statusEl.classList.add("error");
        } finally {
          e.target.disabled = false;
        }
        return;
      }

      if (e.target.classList.contains("save-btn")) {
        const link = linkInput.value.trim();
        if (!link) {
          statusEl.textContent = "쿠팡 링크를 입력해주세요.";
          statusEl.classList.add("error");
          return;
        }
        const itemName = nameInput ? nameInput.value.trim() : (allItems.find((it) => it.item_key === itemKey) || {}).item_name;
        if (!itemName) {
          statusEl.textContent = "상품명을 입력해주세요.";
          statusEl.classList.add("error");
          return;
        }
        e.target.disabled = true;
        statusEl.textContent = "저장 중...";
        statusEl.classList.remove("error");
        try {
          const res = await fetch("/admin/api/beverages/confirm", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              item_key: itemKey,
              item_name: itemName,
              image_url: row.dataset.foundImageUrl || "",
              price: row.dataset.foundPrice ? parseInt(row.dataset.foundPrice, 10) : null,
              reference_url: link,
            }),
          });
          const data = await res.json();
          if (data.ok) {
            statusEl.textContent = "저장 완료";
            await loadItems();
          } else {
            statusEl.textContent = data.error || "저장 실패";
            statusEl.classList.add("error");
          }
        } catch (err) {
          statusEl.textContent = "저장 중 오류 발생";
          statusEl.classList.add("error");
        } finally {
          e.target.disabled = false;
        }
      }
    });

    loadItems();
  </script>
</body>
</html>
