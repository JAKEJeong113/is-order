<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>가맹점 제안 확인</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f8faf9; --card: #ffffff; --text: #111827; --muted: #6b7280;
      --line: #e5e7eb; --mint: #14b8a6; --mint-soft: #ccfbf1; --mint-text: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, "Pretendard", "Malgun Gothic", sans-serif;
      padding: 24px 16px 80px;
    }
    h1 { font-size: 20px; margin: 0 0 6px; }
    .hint-text { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
    .note-card {
      background: var(--card); border: 1px solid var(--line); border-radius: 12px;
      padding: 14px 16px; margin-bottom: 10px;
    }
    .note-card.unread { border-color: var(--mint); }
    .note-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
    .badge {
      font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 999px;
      background: #f3f4f6; color: var(--muted);
    }
    .badge.unread { background: var(--mint-soft); color: var(--mint-text); }
    .note-store { font-size: 12px; font-weight: 700; }
    .note-date { font-size: 11px; color: var(--muted); flex: 1; }
    .note-content { font-size: 13px; line-height: 1.6; white-space: pre-line; margin-bottom: 10px; }
    .row-actions { display: flex; gap: 8px; }
    .read-btn {
      padding: 6px 12px; border: none; border-radius: 6px; font-size: 12px;
      font-weight: 700; cursor: pointer; background: var(--mint-soft); color: var(--mint-text);
    }
    .delete-btn {
      padding: 6px 12px; border: none; border-radius: 6px; font-size: 12px;
      font-weight: 700; cursor: pointer; background: #fee2e2; color: #b91c1c;
    }
    .empty-text { color: var(--muted); font-size: 14px; padding: 20px 4px; }
  </style>
</head>
<body>
  <h1>가맹점 제안 확인</h1>
  <div class="hint-text">/patch-notes 하단 "제안하기"로 가맹점들이 제출한 내용입니다. 대표님만 볼 수 있습니다.</div>

  <div id="list"></div>

  <script>
    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    async function loadSuggestions() {
      const res = await fetch("/admin/api/suggestions");
      const data = await res.json();
      const items = data.items || [];
      const listEl = document.getElementById("list");

      if (items.length === 0) {
        listEl.innerHTML = '<div class="empty-text">아직 제출된 제안이 없습니다.</div>';
        return;
      }

      listEl.innerHTML = items.map((item) => {
        const isUnread = item.status !== "read";
        return `
        <div class="note-card ${isUnread ? "unread" : ""}">
          <div class="note-head">
            <span class="badge ${isUnread ? "unread" : ""}">${isUnread ? "확인 전" : "확인함"}</span>
            <span class="note-store">${escapeHtml(item.display_name || item.store_id)}</span>
            <span class="note-date">${escapeHtml(item.created_at)}</span>
          </div>
          <div class="note-content">${escapeHtml(item.content)}</div>
          <div class="row-actions">
            ${isUnread ? `<button class="read-btn" onclick="markRead(${item.id})">확인 처리</button>` : ""}
            <button class="delete-btn" onclick="deleteSuggestion(${item.id})">삭제</button>
          </div>
        </div>
        `;
      }).join("");
    }

    async function markRead(id) {
      await fetch(`/admin/api/suggestions/${id}/read`, { method: "POST" });
      loadSuggestions();
    }

    async function deleteSuggestion(id) {
      if (!confirm("이 제안을 삭제할까요?")) return;
      await fetch(`/admin/api/suggestions/${id}`, { method: "DELETE" });
      loadSuggestions();
    }

    loadSuggestions();
  </script>
</body>
</html>
